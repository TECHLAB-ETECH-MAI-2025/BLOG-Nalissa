
services:
  app:
    build: .
    container_name: blog-symfony
    volumes:
      - .:/var/www
    ports:
      - 8000:8000
    networks:
      - app-network

  db:
    image: mysql:5.7
    container_name: blog-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: blog
    ports:
      - 3306:3306
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
